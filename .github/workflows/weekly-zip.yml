python
import azure.functions as func
import requests
from bs4 import BeautifulSoup
import json
import os
from datetime import datetime
import logging
import time

app = func.FunctionApp()

# Konfiguration
TRANSKRIPTOR_API_KEY = os.environ.get('TRANSKRIPTOR_API_KEY')
STORAGE_CONNECTION_STRING = os.environ.get('AZURE_STORAGE_CONNECTION_STRING')

CATEGORIES = {
    "Tech_Talks": "https://www.dnnk.dk/tech-talks/",
    "Godmorgen_med_DNNK": "https://www.dnnk.dk/god-morgen-med-dnnk/",
    "Konferencer": "https://www.dnnk.dk/Optagelser fra konferencer og temadage",
    "Jura": "https://www.dnnk.dk/jura-i-klimatilpasning/",
    "Masterclass": "https://www.dnnk.dk/dnnk-masterclass/",
    "Fremtid": "https://www.dnnk.dk/fremtid/",
    "Oevrige": "https://www.dnnk.dk/dnnk-arrangementer/"
}

def extract_youtube_id(url):
    """Udtræk YouTube video ID"""
    if 'youtu.be/' in url:
        return url.split('youtu.be/')[1].split('?')[0]
    elif 'youtube.com/watch?v=' in url:
        return url.split('v=')[1].split('&')[0]
    elif 'youtube.com/embed/' in url:
        return url.split('embed/')[1].split('?')[0]
    return None

def scrape_category(url):
    """Find YouTube videoer"""
    try:
        response = requests.get(url, timeout=30)
        soup = BeautifulSoup(response.content, 'html.parser')
        video_ids = []
        
        for iframe in soup.find_all('iframe'):
            src = iframe.get('src', '')
            if 'youtube.com' in src or 'youtu.be' in src:
                vid = extract_youtube_id(src)
                if vid:
                    video_ids.append(vid)
        
        for link in soup.find_all('a', href=True):
            href = link['href']
            if 'youtube.com' in href or 'youtu.be' in href:
                vid = extract_youtube_id(href)
                if vid:
                    video_ids.append(vid)
        
        return list(set(video_ids))
    except Exception as e:
        logging.error(f"Scrape fejl {url}: {e}")
        return []

def get_processed_videos():
    """Hent behandlede videoer"""
    try:
        from azure.storage.blob import BlobServiceClient
        blob_service = BlobServiceClient.from_connection_string(STORAGE_CONNECTION_STRING)
        
        try:
            container = blob_service.get_container_client("dnnk-transcriptions")
            container.create_container()
        except:
            pass
        
        blob_client = blob_service.get_blob_client("dnnk-transcriptions", "processed_videos.json")
        
        try:
            data = blob_client.download_blob().readall()
            return json.loads(data)
        except:
            return []
    except Exception as e:
        logging.error(f"Get processed error: {e}")
        return []

def save_processed_video(video_id):
    """Gem som behandlet"""
    try:
        from azure.storage.blob import BlobServiceClient
        blob_service = BlobServiceClient.from_connection_string(STORAGE_CONNECTION_STRING)
        
        processed = get_processed_videos()
        if video_id not in processed:
            processed.append(video_id)
            
            blob_client = blob_service.get_blob_client("dnnk-transcriptions", "processed_videos.json")
            blob_client.upload_blob(json.dumps(processed, indent=2), overwrite=True)
    except Exception as e:
        logging.error(f"Save processed error: {e}")

def transcribe_video(video_url):
    """Transskriber med Transkriptor"""
    endpoint = "https://api.transkriptor.com/v1/transcribe"
    
    headers = {
        "Authorization": f"Bearer {TRANSKRIPTOR_API_KEY}",
        "Content-Type": "application/json"
    }
    
    payload = {
        "url": video_url,
        "language": "da",
        "output_format": "txt"
    }
    
    try:
        response = requests.post(endpoint, headers=headers, json=payload, timeout=30)
        response.raise_for_status()
        data = response.json()
        
        job_id = data.get('job_id')
        
        for _ in range(60):
            time.sleep(10)
            
            status_resp = requests.get(f"{endpoint}/{job_id}", headers=headers, timeout=30)
            status_data = status_resp.json()
            
            if status_data['status'] == 'completed':
                return status_data.get('transcription')
            elif status_data['status'] == 'failed':
                raise Exception(f"Fejl: {status_data.get('error')}")
        
        raise Exception("Timeout")
    except Exception as e:
        logging.error(f"Transskription fejl: {e}")
        return None

def save_transcription(video_id, transcription, category):
    """Gem transskription"""
    try:
        from azure.storage.blob import BlobServiceClient
        blob_service = BlobServiceClient.from_connection_string(STORAGE_CONNECTION_STRING)
        
        timestamp = datetime.now().strftime("%Y%m%d_%H%M%S")
        blob_name = f"transcriptions/{category}_{video_id}_{timestamp}.txt"
        
        content = f"""=== DNNK Webinar ===
Kategori: {category}
Video: https://youtube.com/watch?v={video_id}
Dato: {datetime.now().isoformat()}

{'='*50}

{transcription}
"""
        
        blob_client = blob_service.get_blob_client("dnnk-transcriptions", blob_name)
        blob_client.upload_blob(content, overwrite=True)
        
        logging.info(f"✅ Gemt: {blob_name}")
        return blob_name
    except Exception as e:
        logging.error(f"Gem fejl: {e}")
        return None

@app.timer_trigger(schedule="0 0 9 * * *", arg_name="myTimer", run_on_startup=False)
def daily_check(myTimer: func.TimerRequest) -> None:
    """Kører dagligt kl. 09:00 UTC"""
    
    logging.info(f"🔍 Start tjek - {datetime.now()}")
    
    if not TRANSKRIPTOR_API_KEY:
        logging.error("❌ TRANSKRIPTOR_API_KEY mangler!")
        return
    
    processed = get_processed_videos()
    new_count = 0
    
    for category, url in CATEGORIES.items():
        logging.info(f"📂 Tjekker: {category}")
        
        video_ids = scrape_category(url)
        logging.info(f"   Fandt {len(video_ids)} videoer")
        
        for vid in video_ids:
            if vid in processed:
                continue
            
            logging.info(f"🆕 Ny: {vid}")
            
            video_url = f"https://youtube.com/watch?v={vid}"
            transcription = transcribe_video(video_url)
            
            if transcription:
                if save_transcription(vid, transcription, category):
                    save_processed_video(vid)
                    new_count += 1
                    logging.info(f"✅ Komplet: {vid}")
            else:
                logging.error(f"❌ Fejl: {vid}")
    
    logging.info(f"✅ Tjek komplet - {new_count} nye")

@app.route(route="manual", auth_level=func.AuthLevel.FUNCTION)
def manual_trigger(req: func.HttpRequest) -> func.HttpResponse:
    """Manuel trigger"""
    logging.info("🔄 Manuel trigger")
    daily_check(None)
    return func.HttpResponse("Startet!", status_code=200)
