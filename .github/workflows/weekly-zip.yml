yaml
name: Weekly Transcription ZIP

on:
  schedule:
    - cron: '0 20 * * 0'
  workflow_dispatch:

jobs:
  create-zip:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
    
    - name: Create ZIP of all transcriptions
      run: |
        if [ -d "transcritranscriptions" ]; then
          cd transcritranscriptions
          zip -r ../DNNK_Transskriptioner_${{ steps.date.outputs.date }}.zip * || echo "Ingen filer"
          cd ..
        else
          echo "Mappe ikke fundet"
          exit 1
        fi
    
    - name: Upload ZIP as artifact
      uses: actions/upload-artifact@v4
      with:
        name: DNNK_Transskriptioner_${{ steps.date.outputs.date }}
        path: DNNK_Transskriptioner_${{ steps.date.outputs.date }}.zip
        retention-days: 30
    
    - name: Create Release with ZIP
      uses: softprops/action-gh-release@v1
      with:
        tag_name: weekly-${{ steps.date.outputs.date }}
        name: Transskriptioner ${{ steps.date.outputs.date }}
        body: |
          Ugentlig ZIP med alle DNNK transskriptioner
          Download og upload til Claude Project
        files: DNNK_Transskriptioner_${{ steps.date.outputs.date }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
