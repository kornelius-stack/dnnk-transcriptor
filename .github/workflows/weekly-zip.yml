16. dec. 2025
Perfekt valg! Claude Projects er den nemmeste løsning.

Her er step-by-step guiden:

1. Opret et Project:

Gå til claude.ai
Klik på "Projects" i venstre sidebar
Klik "Create Project"
Giv det et navn (f.eks. "Webinar Assistent")
2. Upload dine transskriptioner:

Inde i projektet, klik på "Add Content" eller "Project Knowledge"
Upload dine ZIP-filer (Claude pakker dem automatisk ud)
Claude kan håndtere mange filer og store mængder tekst
3. Skriv Custom Instructions: Her kan du definere hvordan din assistent skal opføre sig. Eksempel:

Du er en hjælpsom assistent der besvarer spørgsmål baseret på vores webinar-transskriptioner. 

- Svar altid baseret på informationen i transskriptionerne
- Citer hvilke webinarer informationen kommer fra
- Hvis du ikke finder svaret i materialet, sig det klart
- Vær venlig og professionel
- Svar på dansk hvis brugeren skriver dansk
4. Del projektet:

Klik på "Share" øverst til højre
Vælg hvem der skal have adgang
Har du dine ZIP-filer klar? Du kan uploade dem direkte i projektet. Hvis du vil have mig til at hjælpe med at formulere de perfekte Custom Instructions baseret på dit indhold, kan du uploade filerne her først, så kan jeg se hvad de indeholder!

Hvad siger du - vil du i gang?

