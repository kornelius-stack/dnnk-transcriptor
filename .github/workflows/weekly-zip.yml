Rigtig godt spørgsmål! Her er de konkrete forskelle:

Hvorfor Claude kan være bedre for dig:

1. Europæisk datahåndtering

Claude har servere i EU (Frankfurt)
Fuldt GDPR-compliant
Anthropic gemmer IKKE dine data til at træne modeller
OpenAI sender data til USA
2. Bedre til lange dokumenter

Claude kan håndtere op til 200.000 tokens (≈150.000 ord) i ét projekt
Perfekt til mange webinar-transskriptioner
GPT har lavere grænser (ca. 20 filer max)
3. Nøjagtighed med kildemateriale

Claude er generelt bedre til at holde sig til det du uploader
Mindre "hallucinering"
4. Pris

ChatGPT Plus: $20/måned per bruger
Claude Pro: ~$20/måned per bruger
Cirka det samme
Hvornår OpenAI kan være bedre:

Hvis du allerede har ChatGPT Plus
Hvis dine brugere allerede er vant til ChatGPT
Custom GPT'er er lidt nemmere at dele
Min ærlige vurdering: Hvis dine webinarer indeholder følsom eller europæisk data → Claude Hvis det er åbent indhold og dine brugere har ChatGPT Plus → OpenAI kan være fint

