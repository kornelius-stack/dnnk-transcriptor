name: DNNK PDF Scraper

on:
  schedule:
    - cron: '0 13 * * 1'  # Kører hver mandag kl. 13:00
  workflow_dispatch:       # Kan også køres manuelt

jobs:
  scrape-pdfs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pypdf

      - name: Run PDF scraper
        run: python pdf_scraper.py

      - name: Commit and push new PDF texts
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add transcritranscriptions/ processed_pdfs.json || true
          git diff --staged --quiet || git commit -m "Tilføj nye PDF-dokumenter fra DNNK hjemmeside"
          git push
